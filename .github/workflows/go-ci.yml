name: React Vite CI/CD

on:
  push:
    branches:
      - development
      - test
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 🔥 Set ENV based on branch
      - name: Set Environment
        id: env
        run: |
          if [[ "${GITHUB_REF_NAME}" == "development" ]]; then
            echo "ENV=development" >> $GITHUB_OUTPUT
          elif [[ "${GITHUB_REF_NAME}" == "test" ]]; then
            echo "ENV=test" >> $GITHUB_OUTPUT
          elif [[ "${GITHUB_REF_NAME}" == "main" ]]; then
            echo "ENV=production" >> $GITHUB_OUTPUT
          fi

      # 🔥 Inject ENV file
      - name: Create .env
        run: |
          if [[ "${{ steps.env.outputs.ENV }}" == "development" ]]; then
            echo "${{ secrets.ENV_DEV }}" > .env
          elif [[ "${{ steps.env.outputs.ENV }}" == "test" ]]; then
            echo "${{ secrets.ENV_TEST }}" > .env
          elif [[ "${{ steps.env.outputs.ENV }}" == "production" ]]; then
            echo "${{ secrets.ENV_PROD }}" > .env
          fi

      # 🔥 Login GHCR
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build docker image
      - name: Build Docker Image
        run: |
          if [[ "${{ steps.env.outputs.ENV }}" == "development" ]]; then
            API_URL=${{ secrets.VITE_API_URL_DEV }}
            GOOGLE_CLIENT_ID=${{ secrets.VITE_GOOGLE_CLIENT_ID_DEV }}
          elif [[ "${{ steps.env.outputs.ENV }}" == "test" ]]; then
            API_URL=${{ secrets.VITE_API_URL_TEST }}
            GOOGLE_CLIENT_ID=${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          else
            API_URL=${{ secrets.VITE_API_URL_PROD }}
            GOOGLE_CLIENT_ID=${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          fi

          docker build \
            --build-arg VITE_API_URL=$API_URL \
            --build-arg VITE_GOOGLE_CLIENT_ID=$GOOGLE_CLIENT_ID \
            -t ghcr.io/${{ github.repository }}:${{ steps.env.outputs.ENV }} \
            -t ghcr.io/${{ github.repository }}:${{ github.sha }} .

      # 🔥 Push
      - name: Push Docker Image
        run: |
          docker push ghcr.io/${{ github.repository }}:${{ steps.env.outputs.ENV }}
          docker push ghcr.io/${{ github.repository }}:${{ github.sha }}
